<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Room AI Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      color: white;
      text-align: center;
      background: radial-gradient(circle at top, #1b2a41, #0b1320 60%, #050a12);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: -200px;
      left: -200px;
      width: 600px;
      height: 600px;
      background: rgba(0, 255, 213, 0.15);
      filter: blur(120px);
      animation: moveGlow 8s infinite alternate;
      z-index: -1;
    }

    @keyframes moveGlow {
      from { transform: translate(0, 0); }
      to { transform: translate(300px, 200px); }
    }

    h1 {
      color: #00ffd5;
      text-shadow: 0 0 20px rgba(0,255,213,0.5);
      margin-bottom: 5px;
    }

    .sub {
      opacity: 0.7;
      margin-bottom: 20px;
    }

    button {
      background: linear-gradient(90deg, #00c9ff, #92fe9d);
      border: none;
      padding: 12px 20px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(0,255,213,0.4);
    }

    #status {
      margin: 10px;
      color: #ffd166;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0,255,213,0.2);
    }

    .value {
      font-size: 32px;
      color: #00ffd5;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0,255,213,0.4);
    }

    canvas {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      margin-top: 20px;
      width: 100%;
      max-width: 900px;
    }

    .aiBox {
      margin-top: 20px;
      padding: 15px;
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
    }
  </style>
</head>

<body>

  <h1>SMART ROOM AI DASHBOARD</h1>
  <div class="sub">IoT + Arduino + AI simulácia systému</div>

  <button onclick="connectArduino()">🔌 Pripojiť Arduino</button>
  <button onclick="toggleAI()">🤖 AI režim</button>

  <div id="status">Arduino nepripojené</div>

  <div class="grid">
    <div class="card">🌡️<br>Teplota<br><div class="value" id="temp">--</div></div>
    <div class="card">💧<br>Vlhkosť<br><div class="value" id="hum">--</div></div>
    <div class="card">🔊<br>Hluk<br><div class="value" id="noise">--</div></div>
    <div class="card">💡<br>Svetlo<br><div class="value" id="light">--</div></div>
  </div>

  <div class="card" style="max-width:900px;margin:20px auto;">
    <h3>📈 História teploty</h3>
    <canvas id="chart" height="200"></canvas>
  </div>

  <div class="aiBox" id="aiBox">🤖 AI: čakám na dáta...</div>

<script>
let ai = false;
let tempHistory = [];

function toggleAI() {
  ai = !ai;
  document.getElementById("aiBox").innerText = ai ? "🤖 AI režim ZAPNUTÝ" : "🤖 AI režim VYPNUTÝ";
}

async function connectArduino() {
  try {
    const port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });
    document.getElementById("status").innerText = "🟢 Arduino pripojené";

    const decoder = new TextDecoderStream();
    port.readable.pipeTo(decoder.writable);
    const reader = decoder.readable.getReader();

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      if (value) parseData(value);
    }

  } catch (e) {
    document.getElementById("status").innerText = "❌ chyba pripojenia";
  }
}

function parseData(data) {
  data.split("\n").forEach(line => {
    line = line.trim();

    if (line.startsWith("TEMP:")) {
      let t = Number(line.replace("TEMP:", ""));
      document.getElementById("temp").innerText = t;

      tempHistory.push(t);
      if (tempHistory.length > 25) tempHistory.shift();

      drawChart();

      if (ai && t > 28) {
        document.getElementById("aiBox").innerText = "🔥 AI: vysoká teplota → zapínam chladenie";
      }
    }

    if (line.startsWith("HUM:")) document.getElementById("hum").innerText = line.replace("HUM:", "");
    if (line.startsWith("NOISE:")) document.getElementById("noise").innerText = line.replace("NOISE:", "");
    if (line.startsWith("LIGHT:")) document.getElementById("light").innerText = line.replace("LIGHT:", "");
  });
}

function drawChart() {
  const c = document.getElementById("chart");
  const ctx = c.getContext("2d");

  ctx.clearRect(0, 0, c.width, c.height);

  ctx.beginPath();
  ctx.strokeStyle = "#00ffd5";
  ctx.lineWidth = 2;

  tempHistory.forEach((v, i) => {
    let x = i * (c.width / 25);
    let y = c.height - v * 4;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.stroke();
}
</script>

</body>
</html>
