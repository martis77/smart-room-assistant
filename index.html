<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Room AI Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #050f1a, #0b2a3a, #144552);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00ffd5;
      margin-bottom: 5px;
    }

    .sub {
      opacity: 0.7;
      margin-bottom: 20px;
    }

    button {
      background: linear-gradient(90deg, #00c9ff, #92fe9d);
      border: none;
      padding: 12px 20px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      transform: scale(1.05);
    }

    #status {
      margin: 10px;
      color: #ffd166;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .value {
      font-size: 32px;
      color: #00ffd5;
      font-weight: bold;
    }

    .alert {
      color: #ff4d4d;
      font-weight: bold;
    }

    canvas {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>SMART ROOM AI DASHBOARD</h1>
  <div class="sub">IoT simulácia + Arduino + AI automatizácia</div>

  <button onclick="connectArduino()">🔌 Pripojiť Arduino</button>
  <button onclick="toggleAI()">🤖 AI režim</button>

  <div id="status">Arduino nepripojené</div>

  <div class="grid">
    <div class="card">🌡️<br>Teplota<br><div class="value" id="temp">--</div></div>
    <div class="card">💧<br>Vlhkosť<br><div class="value" id="hum">--</div></div>
    <div class="card">🔊<br>Hluk<br><div class="value" id="noise">--</div></div>
    <div class="card">💡<br>Svetlo<br><div class="value" id="light">--</div></div>
  </div>

  <div class="card" style="max-width:1000px;margin:20px auto;">
    <h3>📈 História teploty</h3>
    <canvas id="chart" width="900" height="200"></canvas>
  </div>

  <div class="card" id="aiBox" style="max-width:1000px;margin:auto;">
    🤖 AI: čakám na dáta...
  </div>

<script>
let ai = false;
let tempHistory = [];

function toggleAI() {
  ai = !ai;
  document.getElementById("aiBox").innerText = ai ? "🤖 AI zapnuté" : "🤖 AI vypnuté";
}

async function connectArduino() {
  try {
    const port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });
    document.getElementById("status").innerText = "🟢 Arduino pripojené";

    const decoder = new TextDecoderStream();
    port.readable.pipeTo(decoder.writable);
    const reader = decoder.readable.getReader();

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      if (value) parseData(value);
    }

  } catch (e) {
    document.getElementById("status").innerText = "❌ chyba pripojenia";
  }
}

function parseData(data) {
  data.split("\n").forEach(line => {
    line = line.trim();

    if (line.startsWith("TEMP:")) {
      let t = Number(line.replace("TEMP:", ""));
      document.getElementById("temp").innerText = t;

      tempHistory.push(t);
      if (tempHistory.length > 20) tempHistory.shift();

      drawChart();

      if (ai && t > 28) {
        document.getElementById("aiBox").innerHTML = "🔥 AI: zapínam chladenie";
      }
    }

    if (line.startsWith("HUM:")) document.getElementById("hum").innerText = line.replace("HUM:", "");
    if (line.startsWith("NOISE:")) document.getElementById("noise").innerText = line.replace("NOISE:", "");
    if (line.startsWith("LIGHT:")) document.getElementById("light").innerText = line.replace("LIGHT:", "");
  });
}

function drawChart() {
  const c = document.getElementById("chart");
  const ctx = c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  ctx.beginPath();
  ctx.strokeStyle = "#00ffd5";

  tempHistory.forEach((v,i) => {
    let x = i * 40;
    let y = 200 - v * 5;
    if (i === 0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}
</script>

</body>
</html>
